# HTTP client settings applied to every requests.Session created by scrapers
# in this town context.  ssl_verify mirrors requests' verify= parameter:
#   true  → enforce SSL certificate validation (production default)
#   false → skip verification (WSL / corp-proxy dev environments only)
http:
  ssl_verify: false

# Column name mapping from raw HTML headers (after normalisation to snake_case)
# to the UMF Party model fields.  Scrapers read this block — never hardcode
# column names inside scraper logic.
scraper_column_map:
  source_id_col: "parcel_id"   # value used as source_id in te_identity_map
  legal_name_col: "owner"      # value mapped to TeParty.legal_name

  # Patriot Properties HTML structure quirks (portal-specific, not scraper logic).
  #
  # data_table_idx:    which <table> on the page holds property rows (0-based).
  #                    Patriot Properties renders a pagination table first (idx 0),
  #                    then the property data table (idx 1).
  # header_col_offset: number of leading header cells to discard before aligning
  #                    headers to data cells.  Patriot Properties' header row cell 0
  #                    is "Click on the Column Headings…" — BUT the Parcel ID link
  #                    is embedded inside that same cell (not a separate TD), so
  #                    header row and data row both have 11 cells.  No offset needed.
  # source_id_col_idx: 0-based index of the data column that holds the source
  #                    identifier (parcel ID).  Patriot Properties puts the parcel
  #                    ID link in data cell 0, which maps to the ugly "click_on_…"
  #                    header key.  The scraper renames that header slot to
  #                    source_id_col ("parcel_id") so the normal column-name lookup
  #                    works correctly.
  data_table_idx:     1
  header_col_offset:  0
  source_id_col_idx:  0

# Static query-string params sent on every search request (portal-specific).
# The scraper merges these with the dynamic page number before each GET.
# Patriot Properties requires at least one search field to be present;
# SearchOwner="" triggers an "all properties" listing.
scraper_search_params:
  SearchOwner: ""

# Name of the query-string parameter used for pagination (portal-specific).
# Patriot Properties uses lowercase "page"; other portals may use "Page" or "p".
scraper_page_param: "page"

# Legal-name suffixes / tokens that identify an ORGANIZATION party type.
# If any token (case-insensitive, whole-word) appears in legal_name, the record
# is classified as ORGANIZATION instead of INDIVIDUAL.
# Extend this list to cover any entity types present in the local assessor data.
party_type_org_keywords:
  - "LLC"
  - "LLP"
  - "INC"
  - "CORP"
  - "TRUST"
  - "TRS"          # assessor abbreviation for TRUSTEE (e.g. "MURPHY J/TRS")
  - "TR"           # assessor abbreviation for TRUST  (e.g. "REVOCABLE TR")
  - "TRUS"         # Patriot Properties truncates "TRUST" to "TRUS" at 50-char limit
  - "REALTY"
  - "PROPERTIES"
  - "INVESTMENTS"
  - "ASSOCIATES"
  - "ASSOCIATION"
  - "NOMINEE"
  - "ESTATE"       # covers "REAL ESTATE" and "NOMINEE TRUST" patterns
  - "COMMISSION"
  - "BOARD"
  - "AUTHORITY"
  - "FOUNDATION"
  - "PARTNERS"
  - "GROUP"

# School Calendar — Domain 09 (Economic Pulse) fixture.
# Synthetic ICS events for Arlington Public Schools FY2025-2026.
# Each entry maps directly to an ICS VEVENT component field.
# uid  — stable natural key for identity resolution (one Gold row per uid).
# dtstart / dtend — ISO date strings (all-day events use date only; no time component).
# event_type  — TeEvent.event_type vocabulary value.
# foot_traffic_impact — qualitative signal for Economic Pulse scoring ("HIGH" / "MODERATE" / "LOW").
school_calendar_mock_events:
  - uid:         "APS-2025-FIRST-DAY@arlington.k12.ma.us"
    summary:     "First Day of School — APS FY2026"
    event_type:  "SCHOOL_HOLIDAY"
    dtstart:     "2025-09-03"
    dtend:       "2025-09-04"
    description: "First day of school for Arlington Public Schools. High foot-traffic expected near school zones and breakfast spots."
    foot_traffic_impact: "HIGH"

