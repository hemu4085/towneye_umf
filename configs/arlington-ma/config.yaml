# configs/arlington-ma/config.yaml
# Town-specific context injected into MedallionFactory at runtime.
# The factory reads ONLY from this file — no town data is hardcoded in core/.
#
# To onboard a new municipality, copy this file to configs/{new-town-slug}/config.yaml
# and update the values below. Zero changes to core/ are required.

town_slug: arlington-ma
town_name: Arlington
state: MA

# Geohash of the town centroid — precision 6 (~1.2 km cell).
# Generate for any town: python -c "import geohash2; print(geohash2.encode(42.4154, -71.1565, 6))"
geo_hash: "drt2zh"

# Source-system identifier written into te_source when the caller omits it.
default_source: "arlington-ma-opengov"

# Pipeline schema version stamped on every Gold record produced for this town.
version: "1.0.0"

# Agent name written into te_updated_by for records produced by the UMF.
updated_by: "UMF_System"

# Default confidence score applied when the raw record carries no quality signal.
default_confidence: 1.0

# Controlled vocabulary mapping logical source labels to their actual system IDs.
# Used by ingestors to resolve a source name → te_source value at Bronze ingestion.
source_mappings:
  census:           "census_api_2026"
  tax-assessor:     "arlington-ma-tax-assessor"
  permits:          "arlington-ma-permits"
  voters:           "arlington-ma-elections"
  property_tax:     "invoice-cloud"
  # Town Pulse — civic engagement layer
  civic-meetings:   "arlington-ma-civic-meetings"
  community-events: "arlington-ma-community-events"
  311-seeclickfix:  "arlington-ma-311-seeclickfix"
  # Town Pulse — transit layer
  mbta-alerts:      "arlington-ma-mbta-alerts"
  # Domain 09 — Economic Pulse / School Calendar
  school_calendar:  "arlington-public-schools-ics"
  # --- 10-Domain Master Plan Sources ---
  # Land Use & Zoning — town-published bylaw JSON
  zoning_bylaws:      "arlington-ma-zoning-json"
  # Market Dynamics — MLS trend aggregates via BigQuery (private feed)
  market_dynamics:    "mls-trends-bq"
  # Infrastructure Friction — DPW capital plan PDFs / project tracker
  infra_friction:     "arlington-ma-dpw-capital-plans"
  # Digital Connectivity — FCC Broadband Fabric (national dataset)
  connectivity:       "fcc-broadband-fabric"
  # Climate Resilience — FEMA National Flood Hazard Layer GIS
  climate_resilience: "fema-flood-maps"
  # Social Equity — MA EJ burden-score indices (state dataset)
  social_equity:      "ej-burden-indices"
  # Domain 11 — Town Profile (LLM Synthesis)
  town_profile:       "arlington-ma-town-profile"
  # Domain 12 — STR Dynamics (LLM Synthesis)
  str_dynamics:       "arlington-ma-str-dynamics"

# Public portal URLs used by Bronze-layer scrapers.
# All scraper code must read URLs exclusively from this block —
# never hardcode an endpoint in scrapers/ or core/.
scraper_urls:
  # Arlington MA property assessment portal is Patriot Properties, not VGSI.
  # Source verified from https://www.arlingtonma.gov (Property Assessments link).
  property_assessor: "https://arlington.patriotproperties.com/SearchResults.asp"
  # Town Pulse — civic engagement layer
  civic_meetings:    "https://arlington.ma.us/calendar/"
  community_events:  "https://arlington.ma.us/events/"
  seeclickfix_311:   "https://seeclickfix.com/api/v2/issues"
  # Town Pulse — transit layer
  mbta_alerts:       "https://api-v3.mbta.com/alerts"
  # Domain 09 — APS school calendar ICS feed.
  # Replace with the real published URL when available.
  # The scraper falls back to the school_calendar_mock_ics fixture below.
  school_calendar_ics: "https://www.arlington.k12.ma.us/calendar/calendar.ics"
  # --- 10-Domain Master Plan URLs (public endpoints only) ---
  # market_dynamics, connectivity, climate_resilience, social_equity are
  # ingested from BigQuery / licensed feeds and carry no scraper URL here.
  # Placeholder — replace with the real endpoint when the town publishes it.
  # The scraper falls back to the inline zoning_bylaws_mock_data fixture below
  # when this URL returns a non-200 or the body is not valid JSON.
  zoning_bylaws_json:    "https://www.arlingtonma.gov/zoning-bylaws.json"
  # Placeholder — replace with the real PDF URL when the town publishes CIP docs.
  # The scraper falls back to the dpw_mock_projects fixture below when this
  # URL is unreachable or PDF parsing is not yet implemented.
  dpw_capital_plans_pdf: "https://www.arlingtonma.gov/dpw-capital-plans.pdf"

  # Domain 08 — EPA EJScreen REST API (ArcGIS MapServer).
  # DEAD SINCE 2025-02-05: EPA removed ejscreen.epa.gov when the Trump
  # administration eliminated EJ programs.  Data is now loaded from a local
  # cache via scripts/download_ejscreen_csv.py.
  ejscreen_api: "DEAD_SINCE_2025-02-05"

  # Domain 07 — FEMA National Flood Hazard Layer WFS endpoint.
  # Returns GeoJSON features when queried with a bounding box or GEOID filter.
  # The scraper falls back to the climate_mock_geojson fixture when the API
  # is unavailable or returns no features.
  fema_nfhl_wfs: "https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer/28/query"

  # Domain 06 — FCC Broadband Fabric CSV download endpoint.
  # The full national Fabric is licensed; the BDC availability file is public.
  # URL pattern: https://broadbandmap.fcc.gov/api/public/map/listAvailability
  # The scraper falls back to the broadband_mock_csv_rows fixture when the
  # API is unavailable or no API key is configured.
  fcc_broadband_api: "https://broadbandmap.fcc.gov/api/public/map/listAvailability"

  # Domain 05 — Building Permit portal (OpenGov / ViewPoint ISD).
  # Replace with the live endpoint when the town exposes a public API.
  permits_api: "https://permits.arlingtonma.gov/api/v1/permits"

  # Domain 03 — Zillow ZHVI (Home Value Index) by zip code — free public CSV.
  # Contains median home value estimates by zip code, monthly from 2000-present.
  # Scraped via download_zillow_cache.py; stored at data/cache/{town_slug}/zillow_zhvi.csv.
  zillow_zhvi_csv: "https://files.zillowstatic.com/research/public_csvs/zhvi/Zip_zhvi_uc_sfrcondo_tier_0.33_0.67_sm_sa_month.csv"

