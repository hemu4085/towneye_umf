# Social Equity / Environmental Justice — Domain 08 configuration.
# Census tracts covering Arlington MA (Middlesex County, MA, FIPS 25017).
equity_census_tracts:
  - "25017352100"   # East Arlington — Mystic Valley Pkwy corridor
  - "25017352200"   # East Arlington — Mass Ave / Broadway
  - "25017352300"   # Arlington Center — Mass Ave commercial corridor
  - "25017352400"   # Arlington Center — Mystic River / Swan Place
  - "25017352500"   # Arlington Heights / Upper Mass Ave
  - "25017353100"   # Northwest Arlington — Spy Pond / Lake St

# EJScreen indicators included in the Bronze Parquet.
# Each entry defines the column name, a realistic baseline mean for Arlington,
# and the standard deviation used by the synthetic generator.
# All values are national percentiles (0–100) unless noted otherwise.
equity_indicators:
  CANCER_RISK_PERCENTILE:     {mean: 42.0, std: 8.0}
  PM25_PERCENTILE:            {mean: 55.0, std: 6.0}
  LEAD_PAINT_PERCENTILE:      {mean: 68.0, std: 10.0}
  TRAFFIC_PROXIMITY_PERCENTILE: {mean: 72.0, std: 12.0}
  SUPERFUND_PERCENTILE:       {mean: 38.0, std: 9.0}
  WASTEWATER_PERCENTILE:      {mean: 44.0, std: 7.0}
  LOW_INCOME_PERCENTILE:      {mean: 35.0, std: 14.0}
  LINGUISTIC_ISOLATION_PERCENTILE: {mean: 18.0, std: 8.0}
  LESS_HS_ED_PERCENTILE:      {mean: 22.0, std: 9.0}
  UNEMPLOYMENT_PERCENTILE:    {mean: 31.0, std: 11.0}

# Composite EJScreen score = mean of all indicator percentiles.
# A tract is classified as "disadvantaged" when its composite score
# meets or exceeds this threshold (national 65th percentile default).
equity_disadvantaged_threshold: 65.0

# Index names to generate for each tract.
# Multiple indices can be layered on the same tract (one row per index).
equity_index_names:
  - "EPA_EJSCREEN"
  - "MASS_EJ"

# Random seed for reproducible synthetic data generation.
equity_random_seed: 99

# Climate Resilience — Domain 07 configuration.
# FEMA WFS query parameters — town-specific bounding box and community identifier.
# bbox format: "lon_min,lat_min,lon_max,lat_max" in WGS-84 decimal degrees.
# community_id: FEMA CID for the town — find at https://msc.fema.gov/portal/home
climate_fema_wfs_params:
  where:      "STATE_CD='MA' AND COMMUNITY_ID='250173'"
  out_fields: "FLD_ZONE,SFHA_TF,DFIRM_ID,ZONE_SUBTY"
  bbox:       "-71.17,42.39,-71.13,42.44"

# Risk-level lookup table: maps FEMA flood zone codes → (zone_type, risk_level).
# Key = FEMA FLD_ZONE code (string).  Used by the scraper to classify features
# without hardcoding zone codes in the Python module.
climate_flood_zone_map:
  "AE":    {zone_type: "FLOOD_100YR",    risk_level: "HIGH"}
  "AH":    {zone_type: "FLOOD_100YR",    risk_level: "HIGH"}
  "AO":    {zone_type: "FLOOD_100YR",    risk_level: "HIGH"}
  "A":     {zone_type: "FLOOD_100YR",    risk_level: "HIGH"}
  "VE":    {zone_type: "FLOOD_100YR",    risk_level: "HIGH"}
  "X":     {zone_type: "FLOOD_500YR",    risk_level: "MODERATE"}
  "FLOODWAY": {zone_type: "FLOOD_FLOODWAY", risk_level: "HIGH"}
  "D":     {zone_type: "FLOOD_100YR",    risk_level: "UNDETERMINED"}
  "OPEN_WATER": {zone_type: "WETLAND",   risk_level: "LOW"}

# Inline GeoJSON FeatureCollection fixture — used when the FEMA NFHL WFS API
# is unavailable.  Coordinates are real WGS-84 approximations of Arlington MA
