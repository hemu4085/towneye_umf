# Broadband Connectivity — Domain 06 configuration.
# FCC BDC CSV column normalisation map:
#   key   = canonical field name used inside the scraper
#   value = actual CSV header as it appears in the FCC download
# Adjust values when the FCC changes column names between filing periods.
broadband_csv_column_map:
  provider_name:   "brand_name"
  fcc_tech_code:   "technology"
  max_down_mbps:   "max_advertised_download_speed"
  max_up_mbps:     "max_advertised_upload_speed"
  geo_value:       "location_id"
  low_latency:     "low_latency"
  biz_res_code:    "business_residential_code"

# FCC technology code → TeBroadband.tech_type controlled-vocabulary mapping.
# Key = integer FCC tech code (stored as string in YAML).
# Value = tech_type string written into the Gold record.
broadband_tech_code_map:
  "10":  "DSL"
  "40":  "CABLE"
  "50":  "FIBER"
  "60":  "SATELLITE"
  "70":  "FIXED_W"
  "30":  "LTE"
  "31":  "NR"
  "300": "OTHER"

