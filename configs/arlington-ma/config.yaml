    summary:     "Columbus Day / Indigenous Peoples Day — No School"
    event_type:  "SCHOOL_HOLIDAY"
    dtstart:     "2025-10-13"
    dtend:       "2025-10-14"
    description: "No school. Families likely to visit Spy Pond Park, local restaurants, and Arlington Center shops."
    foot_traffic_impact: "MODERATE"

  - uid:         "APS-2025-VETERANS-DAY@arlington.k12.ma.us"
