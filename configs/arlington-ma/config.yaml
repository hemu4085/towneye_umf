# Market Dynamics — runtime parameters for Domain 03.
# Drives the mock-data generator and will drive the live BigQuery ingestor
# when credentials are available.  All market-specific constants live here.
market_dynamics:
  # Arlington MA postal codes to generate / ingest observations for.
  zip_codes:
    - "02474"   # Arlington Centre, East Arlington
    - "02476"   # Arlington Heights

  # Geographic classification applied to zip-code level observations.
  geo_level: "ZIPCODE"

  # Metrics to generate.  Each entry maps a metric_name to its baseline value
  # at the start of the synthetic series.  The ingestor applies a realistic
  # month-over-month drift so the series looks like live MLS data.
  # Units are implied by the metric_name vocabulary (see TeMarketTrend docs).
  metrics:
    MEDIAN_RENT_1BR:
      baseline: 2100       # USD / month
      monthly_drift: 0.005 # +0.5 % / month on average
    MEDIAN_RENT_2BR:
      baseline: 2700
      monthly_drift: 0.005
    MEDIAN_RENT_3BR:
      baseline: 3400
      monthly_drift: 0.004
    MEDIAN_SALE_PRICE:
      baseline: 850000     # USD
      monthly_drift: 0.003
    AVG_DAYS_ON_MARKET:
      baseline: 18         # days
      monthly_drift: -0.01 # market tightening slightly each month
    MONTHS_OF_SUPPLY:
      baseline: 1.4        # months
      monthly_drift: -0.02
    PRICE_PER_SQFT:
      baseline: 580        # USD / ft²
      monthly_drift: 0.004

  # Number of trailing months to generate for the synthetic series.
  history_months: 12

  # Seed for the random noise component so results are reproducible between runs.
  random_seed: 42
  bigquery_project: "towneye-umf"
  bigquery_dataset: "market_dynamics"
  bigquery_table:   "mls_trends"

# Maximum pages fetched per scraper run.
#   Development / verification : set to a small number (e.g. 5 → ~50 records).
#   Production full-crawl      : set to null (no limit; Arlington has ~1,567 pages).
scraper_max_pages: 5

# Town Pulse — per-source runtime parameters consumed by civic scrapers.
# Keeps all endpoint-specific knobs out of scraper logic and in config.
town_pulse:

  civic_meetings:
    # Calendar category label used to filter the Arlington events feed
    # to board/committee meetings only.
    calendar_category: "Boards & Committees"
    # Number of upcoming days to fetch per run.
    lookahead_days: 90

  community_events:
    # Calendar category label for general public/community events.
    calendar_category: "Community Events"
    lookahead_days: 30

  seeclickfix:
    # Arlington's SeeClickFix place identifier — drives the ?place_url= param.
    place_url: "NO_SCF_COVERAGE"  # Arlington MA slug returns 0 issues on SCF — use LLM synthesis
    # Issue statuses to ingest; "closed" excluded to focus on actionable signals.
    statuses:
      - "open"
      - "acknowledged"
      - "in_progress"
    # Page size for the SeeClickFix REST API (max 100 per their docs).
    per_page: 100
    # TeEvent.event_type value written on every Gold record from this source.
    # Lives here so scrapers never hardcode domain vocabulary.
    event_type: "311_REQUEST"

  mbta:
    # Bus routes that serve Arlington — drives the MBTA V3 API filter[route] param.
    # Route 77 : Arlington Heights → Harvard Square
    # Route 79 : Arlington Heights → Alewife
    # Route 350: Burlington Depot → Alewife (express, serves Arlington Heights)
    routes:
      - "77"
      - "79"
      - "350"
    # MBTA V3 activity filters — alert must affect at least one of these
    # passenger activities to be ingested.
    # Full vocabulary: BOARD, EXIT, RIDE, PARK_CAR, BRINGING_BIKE, STORE_BIKE, ALL
    activities:
      - "BOARD"
      - "EXIT"
      - "RIDE"
    # Environment variable holding the MBTA V3 API key.
    # Free key at https://api-v3.mbta.com — optional but avoids the
    # unauthenticated rate limit of 20 requests / minute.
    api_key_env: "MBTA_API_KEY"
    # TeEvent.event_type value written on every Gold record from this source.
    event_type: "TRANSIT_ALERT"

# ---------------------------------------------------------------------------
# Domain 11 — Town Profile mock fixture
# Used as fallback when no LLM API key is set in the environment.
# ---------------------------------------------------------------------------
town_profile_mock_data:
  neighborhood_vibes: >
    Arlington is a close-knit, transit-oriented suburb just four miles northwest
    of Boston. Its tree-lined streets mix Victorian two-families with post-war
    ranch houses, anchored by a lively Massachusetts Avenue commercial corridor
    that blends independent coffee shops, farm-to-table restaurants, and local
    bookstores. The town attracts young professionals, families seeking top-rated
    public schools, and academics drawn to its proximity to Cambridge and
    Somerville.
  major_employers:
    - "Arlington Public Schools"
    - "Town of Arlington (municipal government)"
    - "Lahey Health / Beth Israel Deaconess"
    - "MIT Lincoln Laboratory (nearby)"
    - "Local retail & hospitality (Mass Ave corridor)"
  nimby_index: 6.5
  housing_character: "OWNER_DOMINATED"
  political_lean: "PROGRESSIVE"
  walkability_score: 78
  transit_score: 65
  school_rating: 8.2
  sweet_spots:
    - "East Arlington (walkable, near Cambridge)"
    - "Arlington Center (Mass Ave corridor)"
    - "Brattle Street / Spy Pond area"
  risks:
    - "Limited new housing supply — strict single-family zoning in most districts"
    - "High property taxes relative to neighbouring towns"
    - "MBTA bus-dependent (no Red/Green Line stop within town limits)"
  summary: >
    Arlington offers excellent school quality, walkable town-centre amenities,
    and strong long-term appreciation, but development friction is high due to
    R0/R1 zoning dominance and active neighbourhood associations.

